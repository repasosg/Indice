<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repàs Ciències Naturals 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4fd;
    --deep: #1a1a3e;
    --star: #ffd700;
    --correct: #2ecc71;
    --wrong: #e74c3c;
    --card: #ffffff;
    --shadow: rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: var(--deep);
    color: #fff;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 50% 10%, #ffd700 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 40%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 85% 70%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 85%, #ffd700 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 55%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 75% 25%, #ffd700 0%, transparent 100%),
      radial-gradient(1px 1px at 15% 45%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 30%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 70%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 92% 50%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 5% 65%, #ffd700 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 90%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 95%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 5%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 75%, #fff 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 95% 35%, #ffd700 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* TOP NAV */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,40,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(255,215,0,0.3);
    padding: 0 20px;
  }

  .header-inner {
    max-width: 1000px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 12px 0;
  }

  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--star);
    white-space: nowrap;
    margin-right: 8px;
  }

  nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex: 1;
  }

  .nav-btn {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    padding: 8px 14px;
    border-radius: 30px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.25s ease;
    white-space: nowrap;
    background: rgba(255,255,255,0.08);
    color: #ccd;
  }

  .nav-btn:hover { transform: translateY(-2px); }

  .nav-btn.active {
    color: #fff;
    border-color: currentColor;
    transform: translateY(-2px);
  }

  .nav-btn[data-topic="astres"].active { background: #6c3483; border-color: #a569bd; color: #e8daef; }
  .nav-btn[data-topic="agua"].active   { background: #1a5276; border-color: #5dade2; color: #d6eaf8; }
  .nav-btn[data-topic="relleu"].active { background: #784212; border-color: #e59866; color: #fdebd0; }
  .nav-btn[data-topic="biosfera"].active { background: #1e5631; border-color: #58d68d; color: #d5f5e3; }
  .nav-btn[data-topic="terra"].active    { background: #7b2d00; border-color: #e07b39; color: #fde8d8; }

  .nav-btn[data-topic="astres"]:hover   { background: rgba(108,52,131,0.4); }
  .nav-btn[data-topic="agua"]:hover     { background: rgba(26,82,118,0.4); }
  .nav-btn[data-topic="relleu"]:hover   { background: rgba(120,66,18,0.4); }
  .nav-btn[data-topic="biosfera"]:hover { background: rgba(30,86,49,0.4); }
  .nav-btn[data-topic="terra"]:hover    { background: rgba(123,45,0,0.4); }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    animation: fadeInUp 0.6s ease;
  }

  .welcome .planet {
    font-size: 5rem;
    animation: float 4s ease-in-out infinite;
    display: block;
    margin-bottom: 20px;
  }

  .welcome h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.8rem;
    color: var(--star);
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .welcome p {
    font-size: 1.1rem;
    color: #aab;
    max-width: 500px;
    margin: 0 auto 30px;
    line-height: 1.6;
  }

  .topic-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-top: 30px;
  }

  .topic-card {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 24px 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-align: center;
  }

  .topic-card:hover {
    transform: translateY(-6px);
    background: rgba(255,255,255,0.1);
  }

  .topic-card .icon { font-size: 2.8rem; display: block; margin-bottom: 10px; }
  .topic-card .name {
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: #eee;
  }

  /* QUIZ SECTION */
  .quiz-section { animation: fadeInUp 0.5s ease; }

  .quiz-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }

  .topic-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-radius: 30px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
  }

  .badge-astres   { background: rgba(108,52,131,0.4); border: 2px solid #a569bd; }
  .badge-agua     { background: rgba(26,82,118,0.4);  border: 2px solid #5dade2; }
  .badge-relleu   { background: rgba(120,66,18,0.4);  border: 2px solid #e59866; }
  .badge-biosfera { background: rgba(30,86,49,0.4);   border: 2px solid #58d68d; }
  .badge-terra    { background: rgba(123,45,0,0.4);   border: 2px solid #e07b39; }

  .score-display {
    margin-left: auto;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    color: var(--star);
    background: rgba(255,215,0,0.1);
    padding: 6px 16px;
    border-radius: 20px;
    border: 2px solid rgba(255,215,0,0.3);
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    height: 8px;
    margin-bottom: 28px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, var(--star), #ff8c00);
  }

  /* QUESTION CARD */
  .question-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: 32px;
    margin-bottom: 20px;
    backdrop-filter: blur(8px);
  }

  .question-num {
    font-size: 0.8rem;
    color: #889;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 800;
    line-height: 1.5;
    color: #fff;
    margin-bottom: 28px;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #dde;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.35);
    transform: translateX(4px);
    color: #fff;
  }

  .option-letter {
    min-width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 900;
    transition: all 0.2s;
  }

  .option-btn.correct {
    background: rgba(46,204,113,0.2);
    border-color: var(--correct);
    color: #a9f7c7;
  }

  .option-btn.correct .option-letter {
    background: var(--correct);
    color: #fff;
  }

  .option-btn.wrong {
    background: rgba(231,76,60,0.2);
    border-color: var(--wrong);
    color: #f5b7b1;
  }

  .option-btn.wrong .option-letter {
    background: var(--wrong);
    color: #fff;
  }

  .option-btn:disabled { cursor: default; }

  /* FEEDBACK */
  .feedback {
    border-radius: 16px;
    padding: 20px 24px;
    margin-top: 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    display: none;
    animation: fadeInUp 0.4s ease;
  }

  .feedback.show { display: block; }

  .feedback.correct-fb {
    background: rgba(46,204,113,0.15);
    border: 2px solid rgba(46,204,113,0.4);
  }

  .feedback.wrong-fb {
    background: rgba(231,76,60,0.12);
    border: 2px solid rgba(231,76,60,0.35);
  }

  .feedback .fb-title {
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    margin-bottom: 8px;
  }

  .feedback.correct-fb .fb-title { color: #58d68d; }
  .feedback.wrong-fb .fb-title   { color: #f1948a; }

  .feedback .explanation {
    color: #ccc;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 10px;
    font-weight: 600;
    font-style: italic;
    border-left: 3px solid rgba(255,255,255,0.2);
  }

  /* NEXT BUTTON */
  .next-btn {
    display: none;
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    border: none;
    transition: all 0.25s ease;
    background: linear-gradient(135deg, #f39c12, #e74c3c);
    color: #fff;
    letter-spacing: 0.5px;
  }

  .next-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(231,76,60,0.4); }
  .next-btn.show { display: block; animation: fadeInUp 0.3s ease; }

  /* RESULTS */
  .results {
    text-align: center;
    padding: 40px 20px;
    animation: fadeInUp 0.6s ease;
  }

  .result-emoji { font-size: 4rem; display: block; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }

  .result-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    margin-bottom: 10px;
    color: var(--star);
  }

  .result-score {
    font-size: 1.2rem;
    color: #aab;
    margin-bottom: 30px;
  }

  .result-score strong { color: #fff; font-size: 2rem; }

  .result-actions {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .result-btn {
    padding: 14px 28px;
    border-radius: 30px;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }

  .result-btn:hover { transform: translateY(-3px); }

  .btn-retry {
    background: linear-gradient(135deg, #9b59b6, #6c3483);
    color: #fff;
    box-shadow: 0 4px 16px rgba(155,89,182,0.4);
  }

  .btn-home {
    background: rgba(255,255,255,0.1);
    color: #ddd;
    border: 2px solid rgba(255,255,255,0.2);
  }

  /* Stars earned display */
  .stars-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 20px 0;
    font-size: 2rem;
  }

  /* ANIMATIONS */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60%  { transform: translateX(-6px); }
    40%, 80%  { transform: translateX(6px); }
  }

  .shake { animation: shake 0.4s ease; }

  /* Responsive */
  @media (max-width: 600px) {
    .welcome h1 { font-size: 2rem; }
    .question-text { font-size: 1.1rem; }
    .question-card { padding: 22px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">🌍 Ciències 5è</div>
    <nav id="mainNav">
      <button class="nav-btn" data-topic="astres" onclick="startTopic('astres')">🪐 Astres i Univers</button>
      <button class="nav-btn" data-topic="agua" onclick="startTopic('agua')">💧 L'Aigua</button>
      <button class="nav-btn" data-topic="relleu" onclick="startTopic('relleu')">⛰️ El Relleu</button>
      <button class="nav-btn" data-topic="biosfera" onclick="startTopic('biosfera')">🌿 La Biosfera</button>
      <button class="nav-btn" data-topic="terra" onclick="startTopic('terra')">🌋 La Terra per dins</button>
    </nav>
  </div>
</header>

<main id="mainContent">
  <!-- Welcome screen -->
  <div class="welcome" id="welcomeScreen">
    <span class="planet">🚀</span>
    <h1>Hola, exploradora!</h1>
    <p>Tria un tema per repassar el teu examen de Ciències Naturals. Tens preguntes de tots els temes. Endavant! ⭐</p>
    <div class="topic-cards">
      <div class="topic-card" onclick="startTopic('astres')">
        <span class="icon">🪐</span>
        <span class="name">Astres i Univers</span>
      </div>
      <div class="topic-card" onclick="startTopic('agua')">
        <span class="icon">💧</span>
        <span class="name">L'Aigua</span>
      </div>
      <div class="topic-card" onclick="startTopic('relleu')">
        <span class="icon">⛰️</span>
        <span class="name">El Relleu</span>
      </div>
      <div class="topic-card" onclick="startTopic('biosfera')">
        <span class="icon">🌿</span>
        <span class="name">La Biosfera</span>
      </div>
      <div class="topic-card" onclick="startTopic('terra')">
        <span class="icon">🌋</span>
        <span class="name">La Terra per dins</span>
      </div>
    </div>
  </div>
  <div id="quizContainer" style="display:none;"></div>
</main>

<script>
// ============================================================
// QUIZ DATA — strictly based on the PDFs provided
// ============================================================
const topics = {
  astres: {
    name: "Astres i Univers",
    icon: "🪐",
    color: "astres",
    questions: [
      { q: "Quin dels següents astres brilla amb llum pròpia?", opts: ["Els planetes","Les estrelles","Els satèl·lits","Els asteroides"], answer: 1, explanation: "Les estrelles són astres que brillen amb llum pròpia. Són formades per gasos a temperatures molt altes que emeten llum." },
      { q: "Quin és el planeta més gran del sistema solar i el que té més satèl·lits?", opts: ["Saturn","Neptú","Júpiter","Mart"], answer: 2, explanation: "Júpiter és el planeta més gran del sistema solar i el que té més satèl·lits (63)." },
      { q: "Com s'anomena la força que fa que un astre atregui els cossos que hi ha a la seva superfície?", opts: ["La translació","La gravetat","La rotació","L'òrbita"], answer: 1, explanation: "La força de la gravetat és la força que fa que un astre atregui els cossos que hi ha a la seva superfície." },
      { q: "Quants planetes té el sistema solar?", opts: ["Set","Nou","Vuit","Deu"], answer: 2, explanation: "El sistema solar és format pel Sol i per un conjunt de vuit planetes i els seus satèl·lits, que hi giren al voltant." },
      { q: "Com s'anomena la galàxia on es troben el Sol i la Terra?", opts: ["Andròmeda","La Via Làctia","Camí de la Lluna","El Braç Espiral"], answer: 1, explanation: "La galàxia on hi ha el Sol i la Terra és la Via Làctia, que conté al voltant de 200.000 milions d'estrelles." },
      { q: "Quina forma té la Via Làctia?", opts: ["Rodona","El·líptica","Espiral","Triangular"], answer: 2, explanation: "La Via Làctia té forma d'espiral, amb diversos braços, i gira sobre un eix central. La Terra està situada a l'extrem d'un d'aquests braços." },
      { q: "Quan un petit meteorit xoca amb l'atmosfera de la Terra, s'encén i forma...", opts: ["Un cometa","Un asteroide","Un estel fugisser","Una glacera"], answer: 2, explanation: "Quan un petit meteorit xoca amb l'atmosfera de la Terra, s'encén i forma el que es coneix com un estel fugisser." },
      { q: "Com s'anomena el recorregut que fa un planeta al voltant d'una estrella?", opts: ["Rotació","Translació","Òrbita","Gravetat"], answer: 2, explanation: "El recorregut que fa un planeta al voltant d'una estrella s'anomena òrbita." },
      { q: "El Sol es va formar fa uns...", opts: ["500 milions d'anys","1.000 milions d'anys","5.000 milions d'anys","10.000 milions d'anys"], answer: 2, explanation: "El Sol es va formar fa uns 5.000 milions d'anys i té un diàmetre d'1,4 milions de quilòmetres, aproximadament." },
      { q: "Quina característica especial té la Terra que permet l'existència de vida?", opts: ["És el planeta més gran","Té les temperatures adequades, existència d'aigua i atmosfera amb oxigen","Té molt de ferro","Queda molt a prop del Sol"], answer: 1, explanation: "Entre les característiques especials de la Terra hi ha les temperatures que s'hi enregistren, l'existència d'aigua i una atmosfera rica en oxigen." },
      { q: "On es troben la majoria dels asteroides del sistema solar?", opts: ["Entre el Sol i Mercuri","Entre Venus i la Terra","Entre Mart i Júpiter","Entre Saturn i Urà"], answer: 2, explanation: "Es considera que hi ha mig milió d'asteroides i la majoria estan situats entre les òrbites dels planetes Mart i Júpiter." },
      { q: "Quin és el nom popular de la Via Làctia?", opts: ["Camí de les Estrelles","Camí de Sant Jaume","Camí de la Lluna","Via de la Nit"], answer: 1, explanation: "La Via Làctia també es coneix popularment amb el nom de Camí de Sant Jaume." },
      { q: "A quina distància aproximada es troba el Sol de la Terra?", opts: ["15 milions de km","150 milions de km","1.500 milions de km","1,4 milions de km"], answer: 1, explanation: "El Sol està situat a uns 150 milions de quilòmetres de la Terra." },
      { q: "Com es diu la capa més externa de la Terra?", opts: ["La geosfera","La hidrosfera","La biosfera","L'atmosfera"], answer: 3, explanation: "L'atmosfera és la capa més externa de la Terra, d'uns 1.000 quilòmetres de gruix, formada principalment per una mescla de gasos." },
      { q: "Com s'anomenen els cossos que giren al voltant d'un planeta?", opts: ["Estrelles","Asteroides","Satèl·lits","Cometes"], answer: 2, explanation: "Els satèl·lits no tenen llum pròpia i giren al voltant d'un planeta descrivint també una òrbita." },
      { q: "Com s'anomena una agrupació d'estrelles, planetes, satèl·lits i altres astres?", opts: ["Un sistema solar","Un univers","Una galàxia","Una nebulosa"], answer: 2, explanation: "Una galàxia és una agrupació d'estrelles, planetes i els seus satèl·lits, juntament amb altres astres." },
      { q: "Quants milions d'estrelles conté aproximadament la Via Làctia?", opts: ["2.000 milions","20.000 milions","200.000 milions","2 milions"], answer: 2, explanation: "La galàxia Via Làctia conté al voltant de 200.000 milions d'estrelles." },
      { q: "On es troba situada la Terra dins la Via Làctia?", opts: ["Al centre de la galàxia","A l'extrem d'un dels braços espirals","Molt prop del nucli central","Entre dues galàxies"], answer: 1, explanation: "La Via Làctia té forma d'espiral, amb diversos braços, i gira sobre un eix central. La Terra està situada a l'extrem d'un d'aquests braços." },
      { q: "Quin és el diàmetre aproximat del Sol?", opts: ["140.000 km","1,4 milions de km","14 milions de km","140 milions de km"], answer: 1, explanation: "El Sol té un diàmetre d'1,4 milions de quilòmetres, aproximadament, més de 100 vegades el de la Terra." },
      { q: "Quin és el paper del Sol per a la Terra?", opts: ["Ens envia meteorits","La llum i l'escalfor que emet permeten la vida al nostre planeta","Ens protegeix dels cometes","Genera la força de gravetat de la Terra"], answer: 1, explanation: "El Sol és l'estrella que hi ha més a prop de la Terra. La llum i l'escalfor que emet permeten la vida al nostre planeta." },
      { q: "Quin fenomen caracteritza els cometes quan s'acosten al Sol?", opts: ["Exploten","Es converteixen en asteroides","Se'ls forma una llarga cua pel desglaç de l'escalfor","Es trenquen en meteorits"], answer: 2, explanation: "Els cometes són cossos formats per un petit nucli de gasos i gel. Quan els cometes s'acosten al Sol, se'ls forma una llarga cua a causa del desglaç produït per l'escalfor." },
      { q: "Com s'anomena el conjunt format per una estrella i els planetes que giren al seu voltant?", opts: ["Una galàxia","Un univers","Un sistema planetari","Una constel·lació"], answer: 2, explanation: "Una estrella i els planetes que giren al seu voltant formen un sistema planetari. El sistema solar és el sistema planetari al qual pertany la Terra." },
      { q: "Com s'anomena la part de la Terra formada per roques?", opts: ["La hidrosfera","L'atmosfera","La biosfera","La geosfera"], answer: 3, explanation: "La geosfera és la part de la Terra formada per roques. Les roques de la superfície terrestre són sòlides, però les de l'interior, on les temperatures són molt altes, es troben foses, és a dir, en estat líquid." },
      { q: "Per què a l'espai els cossos floten i no cauen?", opts: ["Perquè no hi ha aire","Perquè fa molt de fred","Perquè estan lluny de la força d'atracció dels astres","Perquè giren molt ràpid"], answer: 2, explanation: "A l'espai, lluny de la força d'atracció dels astres, els cossos no cauen a terra. Per això els cossos que hi ha a la Terra cauen i no es mantenen flotant a l'aire com passa a l'espai." },
      { q: "Gràcies a quina força els planetes del sistema solar giren al voltant del Sol?", opts: ["La força del vent solar","La força magnètica","La força de la gravetat","La força centrífuga"], answer: 2, explanation: "Gràcies a la força de la gravetat, els planetes del sistema solar giren al voltant del Sol." },
      { q: "Des d'on es pot distingir a ull nu la Via Làctia com una franja d'estels al cel?", opts: ["Des de qualsevol lloc, a qualsevol hora","Des d'una gran ciutat de dia","Des d'un indret sense gaire il·luminació artificial, en una nit serena","Només amb telescopi"], answer: 2, explanation: "Des de la Terra, en una nit serena i en un indret sense gaire il·luminació artificial, es pot distingir clarament la Via Làctia com una franja amb una gran concentració d'estels que travessa el cel de banda a banda." },
      { q: "Quants asteroides s'estima que hi ha al sistema solar?", opts: ["Uns 5.000","Uns 50.000","Uns mig milió","Uns 5 milions"], answer: 2, explanation: "Els asteroides giren al voltant del Sol, però són més petits que els planetes. Es considera que n'hi ha mig milió i la majoria estan situats entre les òrbites dels planetes Mart i Júpiter." },
      { q: "Quin d'aquests planetes és el primer a partir del Sol?", opts: ["Venus","La Terra","Mart","Mercuri"], answer: 3, explanation: "En el sistema solar, l'ordre dels planetes des del Sol és: Mercuri, Venus, Terra, Mart, Júpiter, Saturn, Urà i Neptú." },
      { q: "Com s'anomenen els fragments de matèria que es mouen per l'espai i que poden tenir mides molt diverses?", opts: ["Cometes","Asteroides","Meteorits","Satèl·lits"], answer: 2, explanation: "Els meteorits són fragments de matèria que es mouen per l'espai. Tenen mides molt diferents. Quan un petit meteorit xoca amb l'atmosfera de la Terra, s'encén i forma el que es coneix com un estel fugisser." },
      { q: "Tots els astres que podem veure a ull nu des del nostre planeta, a quina galàxia pertanyen?", opts: ["A Andròmeda","A la Via Làctia","A diverses galàxies","Al sistema solar únicament"], answer: 1, explanation: "Tots els astres que podem veure a ull nu des del nostre planeta pertanyen a la Via Làctia." },
      { q: "Quina és la definició de l'Univers?", opts: ["Un conjunt de planetes i llunes","El sistema solar i les galàxies properes","Tot allò que existeix: un espai immens amb un nombre incalculable d'astres","El conjunt de galàxies conegudes"], answer: 2, explanation: "L'Univers és tot allò que existeix: és un espai immens en el qual hi ha un nombre incalculable d'astres." },
      { q: "Quina és la característica principal d'un astre o cos celeste?", opts: ["Brillar amb llum pròpia","Tenir una forma definida i moure's d'una manera determinada per l'Univers","Girar al voltant d'un planeta","Estar format per gasos"],  answer: 1, explanation: "Un astre o cos celeste té una forma definida i es mou d'una manera determinada per l'Univers." },
      { q: "Els planetes, tenen llum pròpia?", opts: ["Sí, tots els planetes emeten llum","No, els planetes no tenen llum pròpia","Sí, però molt dèbil","Només els planetes gegants"], answer: 1, explanation: "Els planetes són cossos sòlids de forma esfèrica que no tenen llum pròpia i giren al voltant d'una estrella." },
      { q: "Quin és el gruix aproximat de l'atmosfera terrestre?", opts: ["100 quilòmetres","1.000 quilòmetres","10.000 quilòmetres","100.000 quilòmetres"], answer: 1, explanation: "L'atmosfera és la capa més externa de la Terra, d'uns 1.000 quilòmetres de gruix, formada principalment per una mescla de gasos." },
      { q: "En quin estat es troben les roques de l'interior de la Terra?", opts: ["En estat sòlid","En estat gasós","En estat líquid (foses) per les altes temperatures","En estat de plasma"], answer: 2, explanation: "La geosfera és la part de la Terra formada per roques. Les roques de la superfície terrestre són sòlides, però les de l'interior, on les temperatures són molt altes, es troben foses, és a dir, en estat líquid." },
      { q: "Les roques de la superfície terrestre, en quin estat es troben?", opts: ["En estat líquid","En estat gasós","En estat sòlid","En estat de fusió"], answer: 2, explanation: "A la geosfera, les roques de la superfície terrestre són sòlides, però les de l'interior, on les temperatures són molt altes, es troben foses, és a dir, en estat líquid." },
      { q: "Com es mouen les galàxies a l'Univers?", opts: ["Estan totalment immòbils","Només giren sobre si mateixes","Els astres de les galàxies es mouen i cada galàxia sencera també es desplaça","Només es mouen quan col·lisionen"], answer: 2, explanation: "Els astres de les diferents galàxies es mouen, i cada galàxia sencera també es desplaça." },
      { q: "Quants satèl·lits té Júpiter exactament?", opts: ["16","32","63","100"], answer: 2, explanation: "Júpiter és el planeta més gran del sistema solar i el que té més satèl·lits (63)." },
      { q: "Quin planeta del sistema solar és el darrer (més llunyà del Sol)?", opts: ["Saturn","Urà","Neptú","Plutó"], answer: 2, explanation: "En el sistema solar, l'ordre dels planetes des del Sol és: Mercuri, Venus, Terra, Mart, Júpiter, Saturn, Urà i Neptú. Neptú és el darrer." },
      { q: "Quin és el segon planeta a partir del Sol?", opts: ["Mercuri","Venus","La Terra","Mart"], answer: 1, explanation: "En el sistema solar, l'ordre dels planetes des del Sol és: Mercuri, Venus, Terra, Mart, Júpiter, Saturn, Urà i Neptú. Venus és el segon." },
      { q: "El diàmetre del Sol és més de quantes vegades el diàmetre de la Terra?", opts: ["10 vegades","50 vegades","100 vegades","1.000 vegades"], answer: 2, explanation: "El Sol té un diàmetre d'1,4 milions de quilòmetres, aproximadament, més de 100 vegades el de la Terra." },
      { q: "Quina diferència hi ha entre un planeta i un satèl·lit?", opts: ["Els planetes giren al voltant d'un satèl·lit; els satèl·lits giren al voltant d'una estrella","Els planetes giren al voltant d'una estrella; els satèl·lits giren al voltant d'un planeta","Tots dos giren al voltant del Sol","No hi ha cap diferència"], answer: 1, explanation: "Els planetes giren al voltant d'una estrella. Els satèl·lits no tenen llum pròpia i giren al voltant d'un planeta descrivint també una òrbita." },
      { q: "Hi ha planetes que no tenen cap satèl·lit?", opts: ["No, tots els planetes en tenen almenys un","Sí, hi ha planetes que no en tenen cap i d'altres que en tenen uns quants","Tots els planetes en tenen exactament un","Sí, tots els planetes no en tenen cap"], answer: 1, explanation: "Hi ha planetes que no tenen cap satèl·lit i n'hi ha que en tenen uns quants." },
      { q: "De quin material estan fets principalment els cometes?", opts: ["De roques sòlides","De metalls","D'un petit nucli de gasos i gel","De pols i sorra"], answer: 2, explanation: "Els cometes són cossos formats per un petit nucli de gasos i gel. Quan els cometes s'acosten al Sol, se'ls forma una llarga cua a causa del desglaç produït per l'escalfor." },
      { q: "Quin és el cinquè planeta a partir del Sol?", opts: ["Mart","Saturn","Urà","Júpiter"], answer: 3, explanation: "En el sistema solar, l'ordre dels planetes des del Sol és: Mercuri, Venus, Terra, Mart, Júpiter, Saturn, Urà i Neptú. Júpiter és el cinquè." },
      { q: "Quantes galàxies hi ha aproximadament a l'Univers?", opts: ["Uns centenars","Uns milers","Milers de milions","Un nombre exacte i conegut"], answer: 2, explanation: "A l'Univers hi ha milers de milions de galàxies." },
      { q: "Quin planeta del sistema solar és el quart a partir del Sol?", opts: ["La Terra","Júpiter","Mart","Venus"], answer: 2, explanation: "En el sistema solar, l'ordre dels planetes des del Sol és: Mercuri, Venus, Terra, Mart, Júpiter, Saturn, Urà i Neptú. Mart és el quart." },
      { q: "Quines tres parts es diferencien a la Terra?", opts: ["La geosfera, l'atmosfera i la biosfera","La geosfera, la hidrosfera i l'atmosfera","La litosfera, la hidrosfera i la biosfera","El nucli, el mantell i l'escorça"], answer: 1, explanation: "A la Terra hi podem diferenciar tres parts: la geosfera (roques), la hidrosfera (tota l'aigua) i l'atmosfera (capa de gasos exterior)." },
      { q: "Quin tipus d'astre és el Sol?", opts: ["Un planeta","Un satèl·lit","Una estrella","Un asteroide"], answer: 2, explanation: "El Sol és l'estrella que hi ha més a prop de la Terra. La llum i l'escalfor que emet permeten la vida al nostre planeta." },
      { q: "Com s'atreuen els astres entre si?", opts: ["Amb força magnètica","Amb la força de la gravetat","Amb forces elèctriques","No s'atreuen, es repel·leixen"], answer: 1, explanation: "Els astres s'atreuen entre si, de manera que es mantenen en les seves òrbites respectives. Aquesta força d'atracció s'anomena gravetat." }

  agua: {

    questions: [
      { q: "Com s'anomena el conjunt de tota l'aigua que hi ha al nostre planeta?", opts: ["La biosfera","L'atmosfera","La hidrosfera","La litosfera"], answer: 2, explanation: "La hidrosfera és el conjunt de tota l'aigua que hi ha al nostre planeta." },
      { q: "En quins estats pot estar l'aigua a la Terra?", opts: ["Líquid i sòlid","Líquid, sòlid i gasós","Gasós i sòlid","Només en estat líquid"], answer: 1, explanation: "L'aigua que hi ha a la Terra pot estar en estat líquid, sòlid o gasós." },
      { q: "Quin percentatge de l'aigua de la Terra és salada?", opts: ["50%","75%","97%","30%"], answer: 2, explanation: "L'aigua salada és als mars i als oceans i suposa un 97% del total de l'aigua del planeta, mentre que la resta és aigua dolça." },
      { q: "En el cicle de l'aigua, com s'anomena l'etapa en que l'aigua líquida es converteix en vapor a causa de l'escalfor del sol?", opts: ["La condensació","La solidificació","La fusió","L'evaporació"], answer: 3, explanation: "L'evaporació: l'aigua líquida es converteix en vapor d'aigua a causa de l'escalfor del sol. El vapor d'aigua queda dispers en l'aire, barrejat amb altres gasos." },
      { q: "Quan el vapor d'aigua puja a l'atmosfera i es refreda, tornant a estat líquid i formant núvols, com s'anomena aquest procés?", opts: ["L'evaporació","La condensació","La fusió","La precipitació"], answer: 1, explanation: "La condensació: quan el vapor d'aigua s'eleva a l'atmosfera, es refreda i es condensa, és a dir, torna a l'estat líquid i es converteix en petites gotes d'aigua, que formen els núvols." },
      { q: "En quin curs d'un riu és l'aigua més cabalosa però corre amb menys velocitat?", opts: ["Curs alt","Curs mitjà","Curs baix","Desembocadura"], answer: 2, explanation: "El curs baix és on el riu és més cabalós, però les seves aigües discorren a poca velocitat perquè sovint travessen zones força planes." },
      { q: "Com s'anomena la quantitat d'aigua que porta un riu?", opts: ["El curs","El cabal","El llit","El meandre"], answer: 1, explanation: "El cabal d'un riu és la quantitat d'aigua que porta." },
      { q: "Quin és el final d'un riu on pot desembocar al mar, un llac o un altre riu?", opts: ["El naixement","El curs alt","La desembocadura","El meandre"], answer: 2, explanation: "La desembocadura és el final d'un riu, que pot ser el mar, un llac o un altre riu. Es poden formar deltes." },
      { q: "Com s'anomena un revolt molt marcat que fa un riu, generalment en el curs mitjà?", opts: ["Una cascada","Un afluent","Un estany","Un meandre"], answer: 3, explanation: "Un meandre és un revolt molt marcat que fa un riu, generalment en el curs mitjà." },
      { q: "Com s'anomena un corrent d'aigua que només es forma quan plou?", opts: ["Un rierol","Una riera","Un torrent","Un afluent"], answer: 1, explanation: "Una riera és un corrent d'aigua que només es forma quan plou." },
      { q: "Al curs alt d'un riu, quin procés és predominant?", opts: ["Depositar sediments","Transportar materials lentament","Erosionar el terreny per la força del corrent","Formar meandres"], answer: 2, explanation: "Al curs alt, el riu porta poca aigua, però com que el pendent és molt fort, té molta força, arrenca materials i erosiona el terreny." },
      { q: "Com s'anomena una gran massa de gel situada a zones fredes que es desplaça?", opts: ["Un estany","Una glacera","Un llac","Una riera"], answer: 1, explanation: "Una glacera és una gran massa de gel situada a zones fredes que es desplaça." },
      { q: "Com s'anomena un riu que desemboca en un altre riu?", opts: ["Un torrent","Un rierol","Un afluent","Una cascada"], answer: 2, explanation: "Un afluent és un riu que desemboca en un altre riu." },
      { q: "On trobem normalment l'aigua en estat sòlid (gel o neu)?", opts: ["Als rius i llacs","Als cims de les muntanyes i als pols","A l'atmosfera","Als mars i oceans"], answer: 1, explanation: "Normalment trobem l'aigua en estat sòlid (gel o neu) als cims de les muntanyes i als pols." },
      { q: "On trobem l'aigua en estat gasós?", opts: ["Als rius","Als oceans","A l'atmosfera, com a vapor d'aigua","Als corrents subterranis"], answer: 2, explanation: "L'aigua en estat gasós (vapor d'aigua) la trobem a l'atmosfera." },
      { q: "Quina és la característica que diferencia la Terra de qualsevol altre planeta conegut?", opts: ["Tenir atmosfera","L'existència d'aigua","Tenir satèl·lits","Tenir volcans"], answer: 1, explanation: "L'existència d'aigua és una de les característiques que diferencia la Terra de qualsevol altre planeta conegut." },
      { q: "En el cicle de l'aigua, com s'anomena el procés en que la neu i el glaç es fonen gràcies a l'escalfor del sol?", opts: ["La condensació","L'evaporació","La solidificació","La fusió"], answer: 3, explanation: "La fusió: la neu i el glaç que s'acumulen a la superfície es fonen amb l'escalfor del sol." },
      { q: "En el cicle de l'aigua, en quin cas la precipitació cau en forma de neu o calamarsa?", opts: ["Quan hi ha molt sol","Quan la temperatura és molt alta","Quan la temperatura és baixa i l'aigua dels núvols se solidifica","Quan hi ha molta humitat"], answer: 2, explanation: "La solidificació: si la temperatura és baixa, l'aigua dels núvols se solidifica, és a dir, passa a l'estat sòlid, i la precipitació cau en forma de neu o calamarsa." },
      { q: "On es troben els corrents d'aigua subterranis?", opts: ["Als núvols","A sota la superfície de la terra","Als cims de les muntanyes","A l'atmosfera"], answer: 1, explanation: "En estat líquid trobem l'aigua als rius, als llacs, als corrents subterranis i als mars i els oceans." },
      { q: "Com s'anomena l'espai per on corren les aigües d'un riu?", opts: ["El curs","El cabal","El llit","L'afluent"], answer: 2, explanation: "El llit és l'espai per on corren les aigües d'un riu." },
      { q: "Com s'anomena un corrent d'aigua que es forma quan plou i baixa amb molta força?", opts: ["Un rierol","Un afluent","Una riera","Un torrent"], answer: 3, explanation: "Un torrent és un corrent d'aigua que es forma quan plou i que baixa amb molta força." },
      { q: "Com s'anomena l'origen d'un riu?", opts: ["La desembocadura","El delta","El naixement","El llit"], answer: 2, explanation: "El naixement és l'origen d'un riu." },
      { q: "Com s'anomena un llac de petites dimensions?", opts: ["Un rierol","Un estany","Una bassa","Un afluent"], answer: 1, explanation: "Un estany és un llac de petites dimensions." },
      { q: "Al curs mitjà d'un riu, quina és l'activitat principal?", opts: ["Erosionar el fons del riu","Transportar els materials arrencats al curs alt","Depositar tots els sediments","Formar cascades"], answer: 1, explanation: "Al curs mitjà, el cabal del riu augmenta, però el pendent ja no és tan acusat. El riu transporta els materials que ha arrencat en el curs alt." },
      { q: "Com canvia d'estat l'aigua?", opts: ["Quan canvia de lloc","Quan s'escalfa o es refreda a causa dels canvis de temperatura","Quan és salada","Quan arriba al mar"], answer: 1, explanation: "L'aigua canvia d'estat quan s'escalfa o es refreda a causa dels canvis de temperatura." },
      { q: "Quin d'aquests elements confirma que l'aigua és necessària per a la vida?", opts: ["L'aire respira els éssers vius","Els éssers vius tenen gran quantitat d'aigua dins el seu cos","L'aigua forma l'atmosfera","Les roques contenen sempre aigua"], answer: 1, explanation: "Els éssers vius tenen gran quantitat d'aigua dins el seu cos. L'aigua és necessària per a la vida." },
      { q: "Quin és el procés de circulació de l'aigua en la natura?", opts: ["El cicle atmosfèric","El cicle de l'aigua","El cicle del nitrogen","El cicle de l'evaporació"], answer: 1, explanation: "El cicle de l'aigua és el procés de circulació de l'aigua en la natura." },
      { q: "Quin tipus d'aigua és la de menor quantitat a la Terra?", opts: ["L'aigua salada dels oceans","L'aigua dolça","L'aigua de l'atmosfera","L'aigua del mar Mediterrani"], answer: 1, explanation: "L'aigua salada suposa un 97% del total de l'aigua del planeta, mentre que la resta és aigua dolça. Per tant, l'aigua dolça és la que hi ha en menor quantitat." },
      { q: "Com s'anomena un salt d'aigua?", opts: ["Un meandre","Un afluent","Una cascada","Un torrent"], answer: 2, explanation: "Una cascada és un salt d'aigua." },
      { q: "Com s'anomena una extensió d'aigua envoltada de terra que ocupa una depressió del terreny?", opts: ["Un estany","Un mar","Un llac","Una riera"], answer: 2, explanation: "Un llac és una extensió d'aigua envoltada de terra que ocupa una depressió del terreny." },
      { q: "Com es defineix un riu?", opts: ["Una massa d'aigua estancada envoltada de terra","Un corrent natural d'aigua que circula per la superfície i va a parar a un altre riu, llac o mar","Un corrent d'aigua subterrani","Una acumulació de neu i gel que es desplaça"], answer: 1, explanation: "Un riu és un corrent natural d'aigua que generalment circula per la superfície de la terra i que va a parar a un altre riu, a un llac o al mar." },
      { q: "En quantes parts s'acostuma a dividir el recorregut d'un riu?", opts: ["Dues: alta i baixa","Tres: alta, mitjana i baixa","Quatre: alta, mitjana, baixa i delta","Cinc parts"], answer: 1, explanation: "En el recorregut d'un riu generalment s'hi poden diferenciar tres parts: curs alt, curs mitjà i curs baix." },
      { q: "Quins processos importants porten a terme els rius sobre la superfície terrestre?", opts: ["Només transporten minerals al mar","L'erosió, el transport de materials, l'excavació de valls i la formació de deltes","Únicament omplen els mars i oceans","Creen muntanyes i elevacions del terreny"], answer: 1, explanation: "Els rius són responsables de processos importants de modificació de la superfície del planeta: l'erosió i el transport de materials dels territoris que travessen, l'excavació de valls, la formació de deltes…" },
      { q: "Quines formacions poden aparèixer a la desembocadura d'un riu?", opts: ["Glaceres","Cascades","Deltes","Estanys de muntanya"], answer: 2, explanation: "La desembocadura és el final d'un riu, que pot ser el mar, un llac o un altre riu. Es poden formar deltes." },
      { q: "Com s'anomena un corrent d'aigua de petites dimensions?", opts: ["Una riera","Un afluent","Un rierol","Un torrent"], answer: 2, explanation: "Un rierol és un corrent d'aigua de petites dimensions." },
      { q: "Al curs baix, per qué el riu diposita els materials que transportava?", opts: ["Perquè l'aigua és massa calenta","Perquè ja no té força per arrossegar-los en zones planes","Perquè arriba al mar i l'aigua salada els precipita","Perquè el llit és massa ample"], answer: 1, explanation: "Al curs baix, el riu ja no té força per arrossegar els materials que transportava i els diposita al seu llit, on s'acumulen els sediments." },
      { q: "La quantitat d'aigua que forma la hidrosfera, com és al llarg del temps?", opts: ["Va augmentant progressivament","Va disminuint cada any","Sempre és la mateixa, però canvia d'estat i es mou","Va variant segons les estacions"], answer: 2, explanation: "La quantitat d'aigua que forma la hidrosfera és sempre la mateixa, però canvia d'estat i es va movent d'un lloc a l'altre segons les condicions de l'ambient." },

      { q: "Com s'anomena la part superior del mantell i de quin material és?", opts: ["La litosfera, formada per roques sòlides","L'astenosfera, formada per magma de consistència pastosa","El nucli extern, format per ferro líquid","L'escorça inferior, formada per minerals"], answer: 1, explanation: "La part superior del mantell s'anomena astenosfera, i és formada per materials de consistència pastosa a causa de la seva elevada temperatura: el magma." },
      { q: "Qué és el magma?", opts: ["L'aigua salada de les profunditats oceàniques","Un gas molt dens de l'interior terrestre","El material de consistència pastosa de l'astenosfera","La capa exterior sòlida de la Terra"], answer: 2, explanation: "El magma és el material de consistència pastosa que forma l'astenosfera, la part superior del mantell, a causa de la seva elevada temperatura." },
      { q: "Quantes parts es distingeixen al nucli de la Terra?", opts: ["Una sola part homogènia","Dues: nucli intern (sòlid) i nucli extern (fluid)","Tres parts amb composicions diferents","Cap, el nucli és buit"], answer: 1, explanation: "Al nucli s'hi distingeix un nucli extern, format per materials en estat fluid, i un nucli intern, format per materials en estat sòlid." },
      { q: "Quina és la litosfera i quina és la seva gruixària?", opts: ["L'escorça sola, amb uns 70 km","La part sòlida de la Terra que inclou l'escorça i la part superior del mantell, entre 70 i 150 km","El mantell complet, de 2.900 km","El nucli i el mantell junts"], answer: 1, explanation: "La litosfera és la part sòlida de la Terra i té entre 70 i 150 km. Comprèn l'escorça terrestre i la part superior del mantell." },
      { q: "En quants blocs està fragmentada la litosfera?", opts: ["En un sol bloc continu","En dos blocs: un per a cada hemisferi","En diversos blocs anomenats plaques litosfèriques","En milers de fragments petits sense nom"], answer: 2, explanation: "La litosfera està fragmentada en blocs, com si fos un puzle, anomenats plaques litosfèriques." },
      { q: "On suren les plaques litosfèriques?", opts: ["Sobre el nucli extern líquid","Sobre l'astenosfera, damunt del magma","Sobre l'escorça oceànica","Sobre el mantell intern sòlid"], answer: 1, explanation: "Les plaques litosfèriques suren sobre l'astenosfera, damunt dels materials que formen el magma, i es desplacen molt lentament." },
      { q: "Quins fenòmens naturals han originat els moviments de les plaques litosfèriques?", opts: ["Les tempestes i els huracans","Les marees i els tsunamis","Les serralades, els volcans i els terratrèmols","Les corrents oceàniques i els vents"], answer: 2, explanation: "Els moviments de les plaques litosfèriques (separar-se, acostar-se, empènyer-se) han originat les serralades, els volcans o han desencadenat els terratrèmols." }
    ]
  }
};

// ============================================================
// STATE
// ============================================================
let currentTopic = null;
let questions = [];
let qIndex = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function startTopic(topicKey) {
  currentTopic = topicKey;
  qIndex = 0;
  score = 0;
  answered = false;

  // Shuffle and pick 10 questions
  questions = shuffle(topics[topicKey].questions).slice(0, 10);

  // Nav active state
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-topic="${topicKey}"]`).classList.add('active');

  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('quizContainer').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  if (qIndex >= questions.length) {
    renderResults();
    return;
  }

  const topic = topics[currentTopic];
  const q = questions[qIndex];
  answered = false;

  const pct = Math.round((qIndex / questions.length) * 100);
  const letters = ['A','B','C','D'];

  const html = `
    <div class="quiz-section">
      <div class="quiz-header">
        <div class="topic-badge badge-${topic.color}">
          ${topic.icon} ${topic.name}
        </div>
        <div class="score-display">⭐ ${score}/${qIndex}</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="question-card">
        <div class="question-num">Pregunta ${qIndex + 1} de ${questions.length}</div>
        <div class="question-text">${q.q}</div>
        <div class="options" id="optionsContainer">
          ${q.opts.map((opt, i) => `
            <button class="option-btn" id="opt${i}" onclick="selectAnswer(${i})">
              <span class="option-letter">${letters[i]}</span>
              ${opt}
            </button>
          `).join('')}
        </div>
        <div class="feedback" id="feedbackBox"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${qIndex < questions.length - 1 ? 'Següent pregunta →' : 'Veure resultats 🏆'}
      </button>
    </div>
  `;

  document.getElementById('quizContainer').innerHTML = html;
}

function selectAnswer(selected) {
  if (answered) return;
  answered = true;

  const q = questions[qIndex];
  const opts = document.querySelectorAll('.option-btn');
  const feedback = document.getElementById('feedbackBox');

  opts.forEach(b => b.disabled = true);

  if (selected === q.answer) {
    score++;
    opts[selected].classList.add('correct');
    feedback.className = 'feedback correct-fb show';
    feedback.innerHTML = `
      <div class="fb-title">✅ Molt bé! Resposta correcta!</div>
      <div class="explanation">"${q.explanation}"</div>
    `;
  } else {
    opts[selected].classList.add('wrong');
    opts[q.answer].classList.add('correct');
    feedback.className = 'feedback wrong-fb show';
    feedback.innerHTML = `
      <div class="fb-title">❌ Ups! Aquesta no era... La resposta correcta era la ${['A','B','C','D'][q.answer]}.</div>
      <div class="explanation">"${q.explanation}"</div>
    `;
    // Shake wrong answer
    opts[selected].classList.add('shake');
    setTimeout(() => opts[selected].classList.remove('shake'), 500);
  }

  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion() {
  qIndex++;
  renderQuestion();
}

function renderResults() {
  const topic = topics[currentTopic];
  const pct = Math.round((score / questions.length) * 100);
  let emoji, title, msg;

  if (pct === 100) {
    emoji = "🏆"; title = "Perfect! Ets una geni!"; msg = "Has encertat totes les preguntes. Increïble!";
  } else if (pct >= 80) {
    emoji = "🌟"; title = "Excel·lent!"; msg = "Ho has fet molt bé. Ets una crack!";
  } else if (pct >= 60) {
    emoji = "😊"; title = "Molt bé!"; msg = "Bon resultat! Repassant una mica més, ho bordaràs.";
  } else if (pct >= 40) {
    emoji = "💪"; title = "Anem bé!"; msg = "Segueix estudiant, ho aconseguiràs!";
  } else {
    emoji = "📚"; title = "A estudiar!"; msg = "Calma, torna a repassar el tema i ho faràs millor!";
  }

  const stars = Math.round((score / questions.length) * 5);
  const starsRow = '⭐'.repeat(stars) + '☆'.repeat(5 - stars);

  document.getElementById('quizContainer').innerHTML = `
    <div class="results">
      <span class="result-emoji">${emoji}</span>
      <div class="result-title">${title}</div>
      <div class="result-score">
        Has encertat <strong>${score}</strong> de ${questions.length} preguntes
      </div>
      <div class="stars-row">${starsRow}</div>
      <p style="color:#99a;margin-bottom:30px;font-size:1rem;">${msg}</p>
      <div class="result-actions">
        <button class="result-btn btn-retry" onclick="startTopic('${currentTopic}')">
          🔄 Tornar a intentar-ho
        </button>
        <button class="result-btn btn-home" onclick="goHome()">
          🏠 Triar altre tema
        </button>
      </div>
    </div>
  `;
}

function goHome() {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('quizContainer').style.display = 'none';
  document.getElementById('welcomeScreen').style.display = 'block';
  currentTopic = null;
}
</script>
